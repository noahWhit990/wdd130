<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallin H. Oaks</title>
    <style>
        /* Insert styles here, this is called an internal stylesheet  */
        @import url('https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&display=swap');

        body {
            background: #FFECD7;
        }

        #prophet-card {
            background-color: #008db1;
            border: 5px solid #004E36;
            border-radius: 50px;
            width: 400px;
            height: 100%;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #FFFFFE;
            font-family: Helvetica;
            margin: 20px auto;
        }

        #sub-title {
            font-family: Helvetica;
            color: #91e4fb;
            margin: auto auto 10px;
            text-align: center;
            text-decoration: none;
        }
        
        ul {
            font-family: Helvetica;
            font-size: 20px;
            color: #FFFFFE;
            margin: 10px auto;
        }

        #quote {
            font-family: Tangerine;
            font-size: 30px;
            color: #ffd783;
            margin: 25px 10px 50px;
        }

        #oaks-img {
            width: 50%;
            margin: auto;
            border: 10px solid white;
        }
    </style>
</head>
<body>
    <div id = "prophet-card">
        <h1>Dallin H. Oaks</h1>
        <a id="sub-title" href="https://churchofjesuschrist.org" target="_blank">18th President of the Church of Jesus Christ of Latter-day Saints</a>
        <img id="oaks-img" src="images/oaks.webp" alt="President Dallin H. Oaks">
        <ul>
            <li>Born: Aug 12, 1932</li>
            <li>Apostle: Apr 7, 1984</li>
            <li>Prophet: Oct 14, 2025</li>
        </ul>
        <p id="quote">"The only solution to the differences that divide us is for all of us to follow our Savior's teachings and to gradually become even as He is."</p>
    </div>
</body>
</html>
