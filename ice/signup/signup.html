<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            display: flex;
            width: 350px;
            border: 10px solid blue;
            background-color: white;
            border-radius: 30px;
            justify-self: center;
            margin-top: 10px;
            flex-direction: column;
        }

        img {
            width: 100%;
        }

        #top {
            position: relative;
        }
        
        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
        }

        h1 {
            color: white;
            position: absolute;
            bottom: 45px;
            left: 100px;
            font-size: 32px;
        }

        h2 {
            color: white;
            position: absolute;
            bottom: 15px;
            left: 95px;
        }

        h3 {
            text-align: center;
            margin: 15px 0;
        }

        #jesus_feeds_5000 {
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            height: 150px;
            object-fit: cover;
            object-position: top;
        }

        #myForm {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            padding: 10px 20px;
        }

        input {
            margin: 8px;
        }

        label {
            margin: 8px;
        }

        #bottom {
            display: flex;
            justify-content: space-between;
        }

        .scriptures {
            width: 60px;
            height: 90px;
        }

        #old-testament {
            border-bottom-left-radius: 20px;
        }

        #pearl-of-great-price {
            border-bottom-right-radius: 20px;
        }

        #news {
            grid-column: 1 / 3;
            justify-self: center;
        }

        #terms {
            grid-column: 1 / 3;
        }

        #submit {
            grid-column: 1 / 3;
            justify-self: center;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <div id="top">
            <button type="button" id="closeBtn">X</button>
            <img id="jesus_feeds_5000" src="images/jesus_feeds_5000.jpeg" alt="Jesus Feeding the 5000">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section id="news">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section id="terms">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section id="submit">
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="bottom">
                <img class="scriptures" id="old-testament" src="images/old_testament.webp" alt="Old Testament">
                <img class="scriptures" id="new-testament" src="images/new_testament.webp" alt="New Testament">
                <img class="scriptures" id="book-of-mormon" src="images/book_of_mormon.webp" alt="Book of Mormon">
                <img class="scriptures" id="doctrine-and-covenants" src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
                <img class="scriptures" id="pearl-of-great-price" src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
