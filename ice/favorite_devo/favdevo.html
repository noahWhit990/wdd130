<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
        <table id="devotionals">
          <thead>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </thead>
          <tr>
            <td>President Oaks</td>
            <td>First Address to the Youth</td>
            <td>BYU</td>
            <td>2026</td>
          </tr>
          <tr>
            <td>President Nelson</td>
            <td>Youth Devotional</td>
            <td>Conference Center</td>
            <td>2021</td>
          </tr>
          <tr>
            <td>Elder Christofferson</td>
            <td>Devotional for the Missionaries</td>
            <td>Cote d'Ivoire Cocody Stake</td>
            <td>2025</td>
          </tr>
        </table>
        <form id="new-devotional">
          <label for="speaker">Speaker:</label><br>
          <input type="text" id="speaker" name="speaker" placeholder="Speaker"><br>
          <label for="title">Title:</label><br>
          <input type="text" id="title" name="title" placeholder="Title"><br>
          <label for="place">Place:</label><br>
          <input type="text" id="place" name="place" placeholder="Place"><br>
          <label for="year">Year:</label><br>
          <input type="number" id="year" name="year" min="1800" max="2026" step="1" placeholder="Year"><br>
          <input type="submit" value="Submit">
        </form>
      </div>
    </main>
  </div>
</body>
</html>
